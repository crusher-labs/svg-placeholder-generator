<!DOCTYPE html>
<html lang="en"
      data-default-theme="minimal"
      data-theme-lock="minimal"
      data-default-mode="light"
      data-default-brand="#0ea5e9">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Placeholder Generator</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/crusher-ui.min.css" integrity="sha384-EIv1tRpD4TjJA0H6sAVfeiJJyJt6DwPxbTYWSsJzylRFMkqMI6xVARApOqqWm5iI" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/themes/minimal.css" integrity="sha384-QYfQeMTJKWZuoEgfBv8ZvJwG12qr6YW8SF6ziK3aHL9luxKjnoswdj/yek7EwpJN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/static/tool-shell.css" integrity="sha384-+mIUnYgeB+0Qf10OjT3tSbT2al2Y8erQfw/uws4os7AxVKNLYeEUW5zHUehGBTVq" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/static/tool-shell.js" integrity="sha384-gNDnPKn5AoF0e4Q555fGbM+snO+UCP3/z4ErG3cyS/Akusg/bzTO+AYmG1WAMnab" crossorigin="anonymous"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }

        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 18rem), 1fr));
            gap: var(--crusher-spacing-8);
            max-width: 56rem;
            margin-inline: auto;
        }
        .tool-section { padding: var(--crusher-spacing-6); display: grid; gap: var(--crusher-spacing-6); }
        .tool-section h2 {
            margin: 0;
            padding-bottom: var(--crusher-spacing-3);
            border-bottom: 1px solid var(--crusher-border-primary);
            font-size: var(--crusher-font-size-xl);
            color: var(--crusher-text-primary);
        }
        .tool-pair { display: grid; grid-template-columns: 1fr 1fr; gap: var(--crusher-spacing-4); }
        .tool-field { display: grid; gap: var(--crusher-spacing-1); }
        .tool-label { font-size: var(--crusher-font-size-sm); font-weight: 500; color: var(--crusher-text-secondary); }
        input.crusher-tool-control { padding: var(--crusher-spacing-2) var(--crusher-spacing-3); }

        .tool-color-row { display: flex; align-items: center; gap: var(--crusher-spacing-2); }
        .tool-color-swatch {
            inline-size: 2.5rem; block-size: 2.5rem;
            border: none; padding: 0;
            border-radius: var(--crusher-radius-md);
            cursor: pointer;
            background: transparent;
        }
        .tool-color-swatch::-webkit-color-swatch { border-radius: var(--crusher-radius-md); border: 2px solid var(--crusher-border-primary); }
        .tool-color-swatch::-moz-color-swatch { border-radius: var(--crusher-radius-md); border: 2px solid var(--crusher-border-primary); }
        .tool-color-row .crusher-tool-control { flex: 1; }

        .tool-side { display: grid; gap: var(--crusher-spacing-6); align-content: start; }

        #preview-container {
            inline-size: 100%;
            min-block-size: 12rem;
            padding: var(--crusher-spacing-4);
            border-radius: var(--crusher-radius-xl);
            border: 2px solid var(--crusher-border-primary);
            background: var(--crusher-background-surface);
            box-shadow: var(--crusher-shadow-lg);
            display: flex; align-items: center; justify-content: center;
        }
        #preview-container svg {
            max-width: 100%;
            height: auto;
            border-radius: var(--crusher-radius-md);
        }

        .tool-code-wrap { position: relative; display: grid; gap: var(--crusher-spacing-2); }
        textarea.crusher-tool-control {
            min-block-size: 6rem;
            padding: var(--crusher-spacing-3) calc(var(--crusher-spacing-3) + 2rem) var(--crusher-spacing-3) var(--crusher-spacing-3);
            font-family: monospace; font-size: var(--crusher-font-size-xs); resize: none;
        }
        .tool-copy-btn {
            position: absolute; inset-block-start: 1.85rem; inset-inline-end: var(--crusher-spacing-2);
            background: transparent; border: 0; padding: var(--crusher-spacing-1);
            color: var(--crusher-text-secondary); cursor: pointer; line-height: 0;
            border-radius: var(--crusher-radius-md);
        }
        .tool-copy-btn:hover { color: var(--crusher-color-brand-primary); }
        .tool-copy-feedback {
            position: absolute; inset-block-end: var(--crusher-spacing-2); inset-inline-end: var(--crusher-spacing-2);
            font-size: var(--crusher-font-size-xs); color: var(--crusher-color-brand-primary);
        }
        .tool-download-btn {
            inline-size: 100%;
            padding: var(--crusher-spacing-3) var(--crusher-spacing-4);
            font-weight: 700;
        }
    </style>
</head>
<body class="crusher-tool-page">

    <main class="crusher-tool-shell">
        <header class="crusher-tool-header">
            <h1 class="crusher-tool-title">SVG Placeholder Generator</h1>
            <p class="crusher-tool-lede">Create custom SVG placeholders instantly.</p>
        </header>

        <div class="tool-grid">
            <section class="crusher-tool-surface tool-section">
                <h2>Options</h2>

                <div class="tool-pair">
                    <div class="tool-field">
                        <label for="width" class="tool-label">Width</label>
                        <input type="number" id="width" value="800" class="crusher-tool-control">
                    </div>
                    <div class="tool-field">
                        <label for="height" class="tool-label">Height</label>
                        <input type="number" id="height" value="600" class="crusher-tool-control">
                    </div>
                </div>

                <div class="tool-pair">
                    <div class="tool-field">
                        <label class="tool-label" for="bgColor">Background</label>
                        <div class="tool-color-row">
                            <input type="color" id="bgColor" value="#e2e8f0" class="tool-color-swatch" aria-label="Background color picker">
                            <input type="text" id="bgColorText" value="#e2e8f0" class="crusher-tool-control" aria-label="Background color hex">
                        </div>
                    </div>
                    <div class="tool-field">
                        <label class="tool-label" for="textColor">Text Color</label>
                        <div class="tool-color-row">
                            <input type="color" id="textColor" value="#64748b" class="tool-color-swatch" aria-label="Text color picker">
                            <input type="text" id="textColorText" value="#64748b" class="crusher-tool-control" aria-label="Text color hex">
                        </div>
                    </div>
                </div>

                <div class="tool-field">
                    <label for="text" class="tool-label">Text</label>
                    <input type="text" id="text" value="800 x 600" class="crusher-tool-control">
                </div>
                <div class="tool-field">
                    <label for="fontSize" class="tool-label">Font Size</label>
                    <input type="number" id="fontSize" value="48" class="crusher-tool-control">
                </div>
            </section>

            <div class="tool-side">
                <div id="preview-container"></div>
                <div class="tool-code-wrap">
                    <label for="svg-code" class="tool-label">SVG Code</label>
                    <textarea id="svg-code" readonly class="crusher-tool-control"></textarea>
                    <button id="copy-code" type="button" class="tool-copy-btn" title="Copy Code" aria-label="Copy Code">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
                            <path fill-rule="evenodd" d="M4 2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V2Zm2-1a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H6ZM2 5a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1v-1h1v1a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h1v1H2Z"/>
                        </svg>
                    </button>
                    <span id="copy-feedback" class="tool-copy-feedback"></span>
                </div>
                <button id="download-svg" type="button" class="crusher-tool-action tool-download-btn">Download SVG</button>
            </div>
        </div>
    </main>

    <a href="https://tools.muhammadhassaanjaved.com/" id="hub-bubble" class="crusher-tool-fab" title="View All Tools" target="_blank" rel="noopener noreferrer">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
    </a>

    <crusher-style-switcher
      default-theme="minimal"
      default-brand="#0ea5e9"
      hide-themes
      hide-theme-color>
        <svg slot="mode-light-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
        <svg slot="mode-dark-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
    </crusher-style-switcher>
    <script type="module" src="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/crusher-ui.standalone.esm.js" integrity="sha384-RkuNGzCebUwZ5RZDFSKGQ7sDaUpdPfDxO088yXDMPM5CvJ4eBy2Jf/UhLwGay/4K" crossorigin="anonymous"></script>

    <script>
        const widthInput = document.getElementById('width');
        const heightInput = document.getElementById('height');
        const bgColorInput = document.getElementById('bgColor');
        const textColorInput = document.getElementById('textColor');
        const bgColorTextInput = document.getElementById('bgColorText');
        const textColorTextInput = document.getElementById('textColorText');
        const textInput = document.getElementById('text');
        const fontSizeInput = document.getElementById('fontSize');
        const previewContainer = document.getElementById('preview-container');
        const svgCodeTextarea = document.getElementById('svg-code');
        const copyCodeBtn = document.getElementById('copy-code');
        const downloadSvgBtn = document.getElementById('download-svg');
        const copyFeedback = document.getElementById('copy-feedback');

        const SVG_NS = 'http://www.w3.org/2000/svg';

        function generateSvg() {
            const width = widthInput.value || 100;
            const height = heightInput.value || 100;
            const bgColor = bgColorInput.value;
            const textColor = textColorInput.value;
            const text = textInput.value;
            const fontSize = fontSizeInput.value || 24;

            const svg = document.createElementNS(SVG_NS, 'svg');
            svg.setAttribute('width', String(width));
            svg.setAttribute('height', String(height));
            svg.setAttribute('xmlns', SVG_NS);

            const rect = document.createElementNS(SVG_NS, 'rect');
            rect.setAttribute('width', '100%');
            rect.setAttribute('height', '100%');
            rect.setAttribute('fill', bgColor);
            svg.appendChild(rect);

            const textEl = document.createElementNS(SVG_NS, 'text');
            textEl.setAttribute('x', '50%');
            textEl.setAttribute('y', '50%');
            textEl.setAttribute('font-family', 'Inter, sans-serif');
            textEl.setAttribute('font-size', String(fontSize));
            textEl.setAttribute('fill', textColor);
            textEl.setAttribute('text-anchor', 'middle');
            textEl.setAttribute('dy', '.3em');
            textEl.textContent = text;
            svg.appendChild(textEl);

            previewContainer.replaceChildren(svg);

            const serializer = new XMLSerializer();
            svgCodeTextarea.value = serializer.serializeToString(svg);
        }

        function updateInputs() {
            if (this.id === 'width' || this.id === 'height') {
                textInput.value = `${widthInput.value} x ${heightInput.value}`;
            }
            if (this.id === 'bgColor' || this.id === 'bgColorText') {
                const color = this.value;
                bgColorInput.value = color;
                bgColorTextInput.value = color;
            }
            if (this.id === 'textColor' || this.id === 'textColorText') {
                const color = this.value;
                textColorInput.value = color;
                textColorTextInput.value = color;
            }
            generateSvg();
        }

        copyCodeBtn.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(svgCodeTextarea.value);
            } catch {
                svgCodeTextarea.select();
                document.execCommand('copy');
            }
            copyFeedback.textContent = 'Copied!';
            setTimeout(() => { copyFeedback.textContent = ''; }, 2000);
        });

        downloadSvgBtn.addEventListener('click', () => {
            const svgBlob = new Blob([svgCodeTextarea.value], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(svgBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `placeholder_${widthInput.value}x${heightInput.value}.svg`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        });

        [widthInput, heightInput, bgColorInput, textColorInput, bgColorTextInput, textColorTextInput, textInput, fontSizeInput].forEach(input => {
            input.addEventListener('input', updateInputs);
        });

        generateSvg();
    </script>
</body>
</html>
